# MELD 7T production image lock.
#
# Machine-readable format (exactly two whitespace-separated fields):
#   <role> <fully-qualified-repository>@sha256:<manifest-digest>
#
# `ops/release/image-lock.sh validate` rejects tags, duplicate roles, malformed digests, and
# REQUIRED_* placeholders.  A placeholder deliberately blocks release export: rebuild that image
# from the current committed source, inspect its repository manifest digest, and replace the whole
# placeholder token before signing an air-gap bundle.  Never substitute an image/config ID for a
# repository manifest digest.

# Scientific/runtime images.
meld_graph docker.io/meldproject/meld_graph@sha256:e2333882ecf984ffac63970aebf7702deea8b979a3a1e508231d06c07cefd664
spm docker.io/spmcentral/spm@sha256:46e4df84f8b5bd7698fda250e96504719db27f0c117c702e62817f8558327522
hippunfold docker.io/khanlab/hippunfold@sha256:b14d6593839d09de56c21c585df2c02fe78e045d53f445f9d52727dd766a408a

# These two source trees are changing in this hardening release.  Rebuild after all source changes
# are committed; do not reuse the older local images whose manifests do not contain this code.
pkg REQUIRED_REBUILD_CURRENT_SOURCE
api REQUIRED_REBUILD_CURRENT_SOURCE

