---
# One-time host bring-up for the MELD 7T pipeline on Bazzite / Fedora Atomic.
#
# ATOMIC-AWARE:
# - Does NOT install host packages via dnf.
# - Assumes Bazzite already provides podman, distrobox, NVIDIA driver stack, and nvidia-ctk.
# - Sets up user-space directories, NVIDIA CDI, SELinux GPU access, and a rootless dev distrobox.
#
# Run normal:
#   ansible-playbook -i ansible/inventory.ini ansible/bootstrap.yml -K
#
# Recreate meld-dev from scratch:
#   ansible-playbook -i ansible/inventory.ini ansible/bootstrap.yml \
#     -e recreate_dev_box=true \
#     -K
#
# With optional convenience tooling:
#   ansible-playbook -i ansible/inventory.ini ansible/bootstrap.yml \
#     -e recreate_dev_box=true \
#     -e install_brew_tools=true \
#     -e install_ai_cli=true \
#     -K
#
# Notes:
# - The dev distrobox is intentionally ROOTLESS.
# - Do not use `distrobox enter --root` for this workflow.
# - Do not use `--headless`; Distrobox 1.8.2.4 uses `--no-tty`.
# - Fedora Toolbox 44 currently provides a new enough Neovim for LazyVim.
# - Lazygit is installed from the dejan/lazygit COPR inside the distrobox.
# - LazyVim extras are inserted into lua/config/lazy.lua before { import = "plugins" }.
# - LazyVim plugins are not synced headlessly; first interactive nvim launch finishes setup.
# - Brew, LazyVim, Claude, and Codex are convenience tooling, not required pipeline runtime.

- name: Bootstrap Bazzite host for MELD 7T pipeline
  hosts: local
  connection: local
  gather_facts: false

  vars:
    repo_dir: "{{ (playbook_dir + '/..') | realpath }}"
    home_dir: "{{ lookup('env', 'HOME') }}"
    user_path: "{{ lookup('env', 'HOME') }}/.local/bin:{{ lookup('env', 'PATH') }}"

    dev_box: "meld-dev"
    # Keep the development/release environment reproducible too. Update this together with the
    # `meld_dev` row in containers/images.lock after reviewing a new Toolbox base.
    dev_image: "registry.fedoraproject.org/fedora-toolbox@sha256:f94669859d5b9ff10f354bfe034cc3db3ee0d841a7b3ae7688da907c3c012d32"
    cuda_smoke_image: "docker.io/nvidia/cuda@sha256:0f6bfcbf267e65123bcc2287e2153dedfc0f24772fb5ce84afe16ac4b2fada95"

    recreate_dev_box: false
    install_brew_tools: false
    install_ai_cli: false

    # --- Durable data tier: TrueNAS/ZFS over NFS (spec §28) ---
    # Override NAS host/export per deployment (air-gap: this is a host<->NAS intranet flow).
    nas_host: "192.168.5.10"
    nas_export: "/mnt/tank/data/Projects/meld7t/data"
    nfs_mount_point: "{{ repo_dir }}/data"
    nfs_nconnect: 4
    nfs_sec: "sys"                                        # krb5 if a KDC is reachable
    # Whole-export fixed SELinux label. NFS files are nfs_t and cannot hold the xattr that
    # a :z bind-relabel writes, so container_t is denied unless the mount carries this label.
    nfs_selinux_context: "system_u:object_r:container_file_t:s0"

    # --- Long-running services: rootless Podman Quadlet (spec §2) ---
    svc_user: "{{ lookup('env', 'USER') }}"
    quadlet_user_dir: "{{ home_dir }}/.config/containers/systemd"
    svc_config_root: "{{ home_dir }}/.config/meld7t"
    svc_config_dir: "{{ home_dir }}/.config/meld7t/dev"
    svc_env_src: "{{ repo_dir }}/secrets/services.env"

    distrobox_init_timeout_seconds: 900
    distrobox_check_timeout_seconds: 120
    distrobox_install_timeout_seconds: 900

    lazyvim_lazy_lua: "{{ home_dir }}/.config/nvim/lua/config/lazy.lua"

    work_dirs:
      # NOTE: {{ repo_dir }}/data is the NFS mount point, managed by the storage tasks
      # below — deliberately NOT listed here so the file module never chmods the NFS root.
      - path: "{{ repo_dir }}/provenance"
        mode: "0750"
      - path: "{{ repo_dir }}/secrets"
        mode: "0700"

    required_host_commands:
      - podman
      - distrobox
      - nvidia-smi
      - nvidia-ctk
      - getsebool
      - setsebool
      - git

    dev_packages:
      - neovim
      - git
      - gcc
      - gcc-c++
      - make
      - nodejs
      - python3
      - python3-pip
      - ripgrep
      - fd-find
      - wl-clipboard
      - unzip
      - tar
      - gzip
      - curl
      - dnf-plugins-core
      - just
      - ansible-core
      - uv

  tasks:
    # -------------------------------------------------------------------------
    # Host preflight
    # -------------------------------------------------------------------------

    - name: Assert required host commands are available
      ansible.builtin.shell: "command -v {{ item | quote }}"
      args:
        executable: /bin/bash
      changed_when: false
      loop: "{{ required_host_commands }}"
      tags: [host, gpu]

    - name: Assert NVIDIA driver is present on the host
      ansible.builtin.command: nvidia-smi -L
      changed_when: false
      register: nvsmi
      failed_when: nvsmi.rc != 0
      tags: [host, gpu]

    - name: Assert nvidia-container-toolkit is available
      ansible.builtin.command: nvidia-ctk --version
      changed_when: false
      tags: [host, gpu]

    # -------------------------------------------------------------------------
    # NVIDIA CDI + SELinux
    # -------------------------------------------------------------------------

    - name: Ensure CDI directory exists
      ansible.builtin.file:
        path: /etc/cdi
        state: directory
        mode: "0755"
      become: true
      tags: [host, gpu]

    - name: Generate NVIDIA CDI spec to temporary path
      ansible.builtin.command: nvidia-ctk cdi generate --output=/tmp/nvidia-cdi.yaml
      become: true
      changed_when: false
      tags: [host, gpu]

    - name: Check current NVIDIA CDI spec
      ansible.builtin.stat:
        path: /etc/cdi/nvidia.yaml
        checksum_algorithm: sha256
      register: current_cdi_spec
      tags: [host, gpu]

    - name: Check generated NVIDIA CDI spec
      ansible.builtin.stat:
        path: /tmp/nvidia-cdi.yaml
        checksum_algorithm: sha256
      register: generated_cdi_spec
      tags: [host, gpu]

    - name: Install NVIDIA CDI spec if new or changed
      ansible.builtin.copy:
        src: /tmp/nvidia-cdi.yaml
        dest: /etc/cdi/nvidia.yaml
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      become: true
      when: >
        not current_cdi_spec.stat.exists or
        current_cdi_spec.stat.checksum != generated_cdi_spec.stat.checksum
      tags: [host, gpu]

    - name: Check SELinux boolean for container device access
      ansible.builtin.command: getsebool container_use_devices
      changed_when: false
      register: sebool_dev
      tags: [host, gpu]

    - name: Allow confined rootless containers to access GPU devices
      ansible.builtin.command: setsebool -P container_use_devices on
      become: true
      when: sebool_dev.stdout is not search('container_use_devices\\s+-->\\s+on')
      tags: [host, gpu]

    - name: Smoke-test GPU inside a rootless Podman container using CDI
      ansible.builtin.command: >-
        podman run --rm
        --device nvidia.com/gpu=all
        --security-opt=label=disable
        {{ cuda_smoke_image }}
        nvidia-smi -L
      changed_when: false
      register: gpu_container
      failed_when: gpu_container.rc != 0
      tags: [host, gpu]

    # -------------------------------------------------------------------------
    # Durable data tier — TrueNAS/ZFS over NFS (spec §28)
    #
    # Host mounts NFS with a fixed SELinux label; compute containers get a PLAIN
    # bind-mount of the host path (never :z, never NFS-in-container). Installed as a
    # systemd .automount so a down NAS never hangs boot — the mount is established on
    # first access (e.g. the worker's rsync of a completed run).
    # -------------------------------------------------------------------------

    - name: Ensure the NFS mount point exists
      ansible.builtin.file:
        path: "{{ nfs_mount_point }}"
        state: directory
        mode: "0750"
      tags: [storage]

    - name: Compute systemd unit name for the NFS mount
      ansible.builtin.command: "systemd-escape -p --suffix=mount {{ nfs_mount_point }}"
      changed_when: false
      register: nfs_mount_unit
      tags: [storage]

    - name: Compute systemd unit name for the NFS automount
      ansible.builtin.command: "systemd-escape -p --suffix=automount {{ nfs_mount_point }}"
      changed_when: false
      register: nfs_automount_unit
      tags: [storage]

    - name: Read current mount options at the mount point (if mounted)
      ansible.builtin.command: "findmnt -no OPTIONS {{ nfs_mount_point }}"
      changed_when: false
      failed_when: false
      register: nfs_current_opts
      tags: [storage]

    - name: Unmount a stale ad-hoc NFS mount lacking the SELinux context label
      ansible.builtin.command: "umount {{ nfs_mount_point }}"
      become: true
      when:
        - nfs_current_opts.rc == 0
        - "'context=' not in nfs_current_opts.stdout"
      register: nfs_stale_unmount
      changed_when: nfs_stale_unmount.rc == 0
      tags: [storage]

    - name: Install the NFS .mount unit
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ nfs_mount_unit.stdout }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=MELD 7T durable data tier (TrueNAS/ZFS over NFS) — {{ nas_host }}:{{ nas_export }}
          Documentation=meld7t-infra spec §28
          After=network-online.target
          Wants=network-online.target

          [Mount]
          What={{ nas_host }}:{{ nas_export }}
          Where={{ nfs_mount_point }}
          Type=nfs4
          Options=vers=4.2,hard,noatime,nconnect={{ nfs_nconnect }},sec={{ nfs_sec }},context="{{ nfs_selinux_context }}",_netdev
          TimeoutSec=30

          [Install]
          WantedBy=remote-fs.target
      become: true
      register: nfs_mount_unit_file
      tags: [storage]

    - name: Install the NFS .automount unit
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ nfs_automount_unit.stdout }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Automount for MELD 7T durable data tier ({{ nfs_mount_point }})
          Documentation=meld7t-infra spec §28

          [Automount]
          Where={{ nfs_mount_point }}
          TimeoutIdleSec=600

          [Install]
          WantedBy=multi-user.target
      become: true
      register: nfs_automount_unit_file
      tags: [storage]

    - name: Re-check whether the path is mounted after any stale unmount
      ansible.builtin.command: "mountpoint -q {{ nfs_mount_point }}"
      changed_when: false
      failed_when: false
      register: nfs_mounted_now
      tags: [storage]

    - name: Enable the NFS automount (reload units first)
      ansible.builtin.systemd:
        name: "{{ nfs_automount_unit.stdout }}"
        enabled: true
        daemon_reload: true
      become: true
      tags: [storage]

    - name: Start the NFS automount if the path is not already mounted
      ansible.builtin.systemd:
        name: "{{ nfs_automount_unit.stdout }}"
        state: started
      become: true
      when: nfs_mounted_now.rc != 0
      tags: [storage]

    # -------------------------------------------------------------------------
    # Long-running services — rootless Podman Quadlet units (spec §2)
    #
    # Off-the-shelf tier: postgres, redis, orthanc, registry, caddy. (api + worker carry
    # bespoke code and are wired in when built.) Units + config are version-controlled in
    # containers/ and installed into the user Quadlet path; linger lets the user manager
    # boot-start them without an interactive login. Images are NOT pulled/started here —
    # in the air-gap they arrive via the internal registry; start with `just services-up`.
    # -------------------------------------------------------------------------

    - name: Check the services secrets file exists
      ansible.builtin.stat:
        path: "{{ svc_env_src }}"
      register: svc_env_stat
      tags: [services]

    # No secrets yet → skip (don't fail) so the base host bring-up still completes. The note
    # below tells the operator how to enable services. Everything past here is gated on it.
    - name: Note that services are skipped until services.env exists
      ansible.builtin.debug:
        msg: >-
          Skipping long-running services: {{ svc_env_src }} not found. To enable them,
          `cp containers/config/services.env.example secrets/services.env`, fill in real
          secrets, and re-run with `--tags services`.
      when: not svc_env_stat.stat.exists
      tags: [services]

    - name: Ensure the user Quadlet + service-config directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ quadlet_user_dir }}"
        - "{{ svc_config_root }}"
        - "{{ svc_config_dir }}"
        - "{{ svc_config_dir }}/caddy"
        - "{{ svc_config_dir }}/caddy/auth"
        - "{{ svc_config_dir }}/env"
        - "{{ svc_config_dir }}/licenses"
        - "{{ svc_config_dir }}/orthanc"
        - "{{ svc_config_dir }}/postgres"
        - "{{ svc_config_dir }}/redis"
        - "{{ svc_config_dir }}/tls"
        - "{{ svc_config_dir }}/ohif"
        - "{{ svc_config_dir }}/trust"
        - "{{ home_dir }}/.local/lib/meld7t"
        - "{{ home_dir }}/meld7t-state"
        - "{{ repo_dir }}/meld-data"
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Install the shared developer environment under per-service filenames
      ansible.builtin.copy:
        src: "{{ svc_env_src }}"
        dest: "{{ svc_config_dir }}/env/{{ item }}.env"
        mode: "0600"
      loop: [postgres, redis, orthanc, immudb, api, caddy]
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Keep Orthanc's direct development endpoint unauthenticated
      ansible.builtin.lineinfile:
        path: "{{ svc_config_dir }}/env/orthanc.env"
        regexp: '^ORTHANC__AUTHENTICATION_ENABLED='
        line: ORTHANC__AUTHENTICATION_ENABLED=false
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Configure safe immudb development-mode overrides
      ansible.builtin.lineinfile:
        path: "{{ svc_config_dir }}/env/immudb.env"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: IMMUDB_AUTH, value: "true" }
        - { key: IMMUDB_DEVMODE, value: "false" }
        - { key: IMMUDB_MAINTENANCE, value: "false" }
        - { key: IMMUDB_SIGNINGKEY, value: "/run/secrets/immudb-signing-private.pem" }
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Read developer Redis password from services.env
      ansible.builtin.set_fact:
        dev_redis_password: >-
          {{ (lookup('ansible.builtin.file', svc_env_src)
              | regex_search('(?m)^REDIS_PASSWORD=(.+)$', '\\1') | first) }}
      no_log: true
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Install authenticated developer Redis config
      ansible.builtin.copy:
        dest: "{{ svc_config_dir }}/redis/redis.conf"
        mode: "0600"
        content: |
          bind 0.0.0.0
          protected-mode yes
          port 6379
          requirepass {{ dev_redis_password }}
          dir /data
          appendonly yes
          appendfsync everysec
          aof-use-rdb-preamble yes
          maxmemory-policy noeviction
      no_log: true
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Install service config files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "{{ item.mode }}"
      loop:
        - src: "{{ repo_dir }}/containers/config/caddy/Caddyfile.dev"
          dest: "{{ svc_config_dir }}/caddy/Caddyfile"
          mode: "0644"
        - src: "{{ repo_dir }}/containers/config/orthanc/orthanc.json"
          dest: "{{ svc_config_dir }}/orthanc/orthanc.json"
          mode: "0644"
        - src: "{{ repo_dir }}/containers/config/postgres/init-databases.sh"
          dest: "{{ svc_config_dir }}/postgres/init-databases.sh"
          mode: "0755"
        - src: "{{ repo_dir }}/containers/config/ohif/app-config.js"
          dest: "{{ svc_config_dir }}/ohif/app-config.js"
          mode: "0644"
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Generate a development-only immudb signing key
      ansible.builtin.command:
        argv:
          - openssl
          - genpkey
          - -algorithm
          - EC
          - -pkeyopt
          - ec_paramgen_curve:P-256
          - -out
          - "{{ svc_config_dir }}/trust/immudb-signing-private.pem"
      args:
        creates: "{{ svc_config_dir }}/trust/immudb-signing-private.pem"
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Derive the development immudb signing public key
      ansible.builtin.command:
        argv:
          - openssl
          - pkey
          - -in
          - "{{ svc_config_dir }}/trust/immudb-signing-private.pem"
          - -pubout
          - -out
          - "{{ svc_config_dir }}/trust/immudb-signing-public.pem"
      args:
        creates: "{{ svc_config_dir }}/trust/immudb-signing-public.pem"
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Create the development immudb signing Podman secret when absent
      ansible.builtin.shell: |
        set -euo pipefail
        podman secret exists meld7t-immudb-signing-key \
          || podman secret create meld7t-immudb-signing-key \
            {{ (svc_config_dir + '/trust/immudb-signing-private.pem') | quote }} >/dev/null
      args:
        executable: /bin/bash
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Point the stable developer config path at the dev config
      ansible.builtin.file:
        src: "{{ svc_config_dir }}"
        dest: "{{ svc_config_root }}/current"
        state: link
        force: true
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Check stable developer release link
      ansible.builtin.stat:
        path: "{{ home_dir }}/.local/lib/meld7t/current"
      register: dev_current_link
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Point the stable developer release path at this checkout when unconfigured
      ansible.builtin.file:
        src: "{{ repo_dir }}"
        dest: "{{ home_dir }}/.local/lib/meld7t/current"
        state: link
      when:
        - svc_env_stat.stat.exists
        - not dev_current_link.stat.exists
      tags: [services]

    - name: Check stable developer data path
      ansible.builtin.stat:
        path: "{{ home_dir }}/meld7t-state/meld-data"
      register: dev_data_link
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Point stable developer data at checkout scratch when unconfigured
      ansible.builtin.file:
        src: "{{ repo_dir }}/meld-data"
        dest: "{{ home_dir }}/meld7t-state/meld-data"
        state: link
      when:
        - svc_env_stat.stat.exists
        - not dev_data_link.stat.exists
      tags: [services]

    - name: Install Quadlet unit files into the user generator path
      ansible.builtin.copy:
        src: "{{ repo_dir }}/containers/systemd/"
        dest: "{{ quadlet_user_dir }}/"
        mode: "0644"
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Enable linger so user services boot-start without a login
      ansible.builtin.command: "loginctl enable-linger {{ svc_user }}"
      become: true
      changed_when: false
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Determine current user id (for the user systemd runtime dir)
      ansible.builtin.command: id -u
      changed_when: false
      register: svc_uid
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Reload the user systemd manager so Quadlet regenerates service units
      ansible.builtin.command: systemctl --user daemon-reload
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ svc_uid.stdout }}"
      changed_when: false
      when: svc_env_stat.stat.exists
      tags: [services]

    - name: Print services next-step note
      ansible.builtin.debug:
        msg: >-
          Quadlet units installed. Once the service images are present (internal registry or
          `podman pull`), bring the stack up with `just services-up` and check `just services-status`.
      when: svc_env_stat.stat.exists
      tags: [services]

    # -------------------------------------------------------------------------
    # Project directories
    # -------------------------------------------------------------------------

    - name: Create working directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode }}"
      loop: "{{ work_dirs }}"
      tags: [host, dirs]

    # -------------------------------------------------------------------------
    # Rootless Distrobox lifecycle
    # -------------------------------------------------------------------------

    - name: Check whether the dev distrobox container exists
      ansible.builtin.command: podman container exists {{ dev_box | quote }}
      changed_when: false
      failed_when: false
      register: dev_box_exists
      tags: [distrobox]

    - name: Stop existing dev distrobox before recreation
      ansible.builtin.command: distrobox stop {{ dev_box | quote }} --yes
      changed_when: false
      failed_when: false
      when:
        - recreate_dev_box | bool
        - dev_box_exists.rc == 0
      tags: [distrobox]

    - name: Remove existing dev distrobox before recreation
      ansible.builtin.command: distrobox rm {{ dev_box | quote }} --force --yes
      changed_when: true
      failed_when: false
      when:
        - recreate_dev_box | bool
        - dev_box_exists.rc == 0
      tags: [distrobox]

    - name: Refresh dev distrobox existence after optional removal
      ansible.builtin.command: podman container exists {{ dev_box | quote }}
      changed_when: false
      failed_when: false
      register: dev_box_exists_after_removal
      tags: [distrobox]

    - name: Create the rootless NVIDIA-enabled dev distrobox
      ansible.builtin.command: >-
        distrobox create --yes
        --name {{ dev_box | quote }}
        --image {{ dev_image | quote }}
        --nvidia
      environment:
        DBX_NON_INTERACTIVE: "1"
      when: dev_box_exists_after_removal.rc != 0
      tags: [distrobox]

    - name: Initialize the dev distrobox without TTY
      ansible.builtin.shell: >-
        timeout {{ distrobox_init_timeout_seconds }}
        distrobox enter
        --name {{ dev_box | quote }}
        --no-tty
        -- true
      args:
        executable: /bin/bash
      changed_when: false
      register: dev_box_init
      failed_when: dev_box_init.rc != 0
      tags: [distrobox]

    - name: Install required dev packages inside the initialized distrobox
      ansible.builtin.shell: >-
        timeout {{ distrobox_install_timeout_seconds }}
        distrobox enter
        --name {{ dev_box | quote }}
        --no-tty
        -- sudo dnf install -y {{ dev_packages | join(' ') }}
      args:
        executable: /bin/bash
      register: dev_package_install
      changed_when: >
        'Installed:' in dev_package_install.stdout or
        'Upgraded:' in dev_package_install.stdout or
        'Complete!' in dev_package_install.stderr or
        'Complete!' in dev_package_install.stdout
      failed_when: dev_package_install.rc != 0
      tags: [distrobox]

    - name: Enable lazygit COPR inside the distrobox
      ansible.builtin.shell: >-
        timeout {{ distrobox_check_timeout_seconds }}
        distrobox enter
        --name {{ dev_box | quote }}
        --no-tty
        -- sudo dnf copr enable dejan/lazygit -y
      args:
        executable: /bin/bash
      register: lazygit_copr
      changed_when: >
        'Enabling a Copr repository' in lazygit_copr.stdout or
        'enabled' in (lazygit_copr.stdout | lower)
      failed_when: lazygit_copr.rc != 0
      tags: [distrobox, editor]

    - name: Install lazygit inside the distrobox
      ansible.builtin.shell: >-
        timeout {{ distrobox_install_timeout_seconds }}
        distrobox enter
        --name {{ dev_box | quote }}
        --no-tty
        -- sudo dnf install -y lazygit
      args:
        executable: /bin/bash
      register: lazygit_install
      changed_when: >
        'Installed:' in lazygit_install.stdout or
        'Upgraded:' in lazygit_install.stdout or
        'Complete!' in lazygit_install.stderr or
        'Complete!' in lazygit_install.stdout
      failed_when: lazygit_install.rc != 0
      tags: [distrobox, editor]

    - name: Smoke-test GPU inside the dev distrobox
      ansible.builtin.shell: >-
        timeout {{ distrobox_check_timeout_seconds }}
        distrobox enter
        --name {{ dev_box | quote }}
        --no-tty
        -- nvidia-smi -L
      args:
        executable: /bin/bash
      changed_when: false
      register: gpu_distrobox
      failed_when: gpu_distrobox.rc != 0
      tags: [distrobox, gpu]

    - name: Smoke-test core dev tools inside the dev distrobox
      ansible.builtin.shell: >-
        timeout {{ distrobox_check_timeout_seconds }}
        distrobox enter
        --name {{ dev_box | quote }}
        --no-tty
        -- bash -lc 'command -v nvim && command -v git && command -v python3 && command -v node && command -v lazygit && command -v just && command -v ansible-playbook && command -v uv'
      args:
        executable: /bin/bash
      changed_when: false
      register: dev_tools_check
      failed_when: dev_tools_check.rc != 0
      tags: [distrobox]

    - name: Assert Neovim is new enough for LazyVim
      ansible.builtin.shell: |
        timeout {{ distrobox_check_timeout_seconds }} \
        distrobox enter --name {{ dev_box | quote }} --no-tty -- \
        python3 -c 'import re, subprocess, sys; out=subprocess.check_output(["nvim","--version"], text=True).splitlines()[0]; print(out); m=re.search(r"v(\d+)\.(\d+)\.(\d+)", out); sys.exit(0 if m and tuple(map(int, m.groups())) >= (0,11,2) else 1)'
      args:
        executable: /bin/bash
      changed_when: false
      register: nvim_version_check
      failed_when: nvim_version_check.rc != 0
      tags: [distrobox, editor]

    # -------------------------------------------------------------------------
    # Optional Homebrew convenience tools
    # -------------------------------------------------------------------------

    - name: Detect Homebrew
      ansible.builtin.stat:
        path: /home/linuxbrew/.linuxbrew/bin/brew
      register: brew_bin
      tags: [brew]

    - name: Check whether Brewfile exists
      ansible.builtin.stat:
        path: "{{ repo_dir }}/Brewfile"
      register: brewfile
      tags: [brew]

    - name: Install Homebrew CLI tools from Brewfile
      ansible.builtin.shell: >-
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)" &&
        brew bundle --file={{ (repo_dir + '/Brewfile') | quote }}
      args:
        executable: /bin/bash
      register: brew_bundle
      changed_when: >
        'Installing' in brew_bundle.stdout or
        'Upgrading' in brew_bundle.stdout or
        'Removing' in brew_bundle.stdout
      when:
        - install_brew_tools | bool
        - brew_bin.stat.exists
        - brewfile.stat.exists
      tags: [brew]

    # -------------------------------------------------------------------------
    # Shell aliases
    # -------------------------------------------------------------------------

    - name: Ensure ~/.bashrc.d exists
      ansible.builtin.file:
        path: "{{ home_dir }}/.bashrc.d"
        state: directory
        mode: "0755"
      tags: [shell]

    - name: Check modern CLI alias file exists in repo
      ansible.builtin.stat:
        path: "{{ repo_dir }}/shell/modern-cli.sh"
      register: modern_cli_file
      tags: [shell]

    - name: Deploy modern-CLI aliases drop-in
      ansible.builtin.copy:
        src: "{{ repo_dir }}/shell/modern-cli.sh"
        dest: "{{ home_dir }}/.bashrc.d/50-modern-cli.sh"
        mode: "0644"
      when: modern_cli_file.stat.exists
      tags: [shell]

    - name: Ensure ~/.bashrc sources ~/.bashrc.d/*.sh
      ansible.builtin.blockinfile:
        path: "{{ home_dir }}/.bashrc"
        create: true
        marker: "# {mark} meld7t-infra managed"
        block: |
          if [ -d "$HOME/.bashrc.d" ]; then
            for rc in "$HOME"/.bashrc.d/*.sh; do
              [ -f "$rc" ] && . "$rc"
            done
          fi
      tags: [shell]

    # -------------------------------------------------------------------------
    # Editor config
    # -------------------------------------------------------------------------

    - name: Ensure ~/.config exists
      ansible.builtin.file:
        path: "{{ home_dir }}/.config"
        state: directory
        mode: "0755"
      tags: [editor]

    - name: Check whether ~/.config/nvim already exists
      ansible.builtin.stat:
        path: "{{ home_dir }}/.config/nvim/init.lua"
      register: nvim_config
      tags: [editor]

    - name: Clone LazyVim starter to ~/.config/nvim using host git
      ansible.builtin.command: >-
        git clone https://github.com/LazyVim/starter {{ (home_dir + '/.config/nvim') | quote }}
      args:
        creates: "{{ home_dir }}/.config/nvim/init.lua"
      when: not nvim_config.stat.exists
      tags: [editor]

    - name: Detach LazyVim starter from upstream git
      ansible.builtin.file:
        path: "{{ home_dir }}/.config/nvim/.git"
        state: absent
      tags: [editor]

    - name: Remove old misplaced LazyVim extras file
      ansible.builtin.file:
        path: "{{ home_dir }}/.config/nvim/lua/plugins/extras.lua"
        state: absent
      tags: [editor]

    - name: Ensure LazyVim config directory exists
      ansible.builtin.file:
        path: "{{ home_dir }}/.config/nvim/lua/config"
        state: directory
        mode: "0755"
      tags: [editor]

    - name: Check LazyVim lazy.lua exists
      ansible.builtin.stat:
        path: "{{ lazyvim_lazy_lua }}"
      register: lazyvim_lazy_lua_stat
      tags: [editor]

    - name: Patch LazyVim extras into lazy.lua in correct import order
      ansible.builtin.shell: |
        python3 - <<'PY'
        from pathlib import Path
        import re

        path = Path("{{ lazyvim_lazy_lua }}")
        text = path.read_text()

        # Remove any previously misplaced managed block, wherever it landed.
        text = re.sub(
            r'(?ms)^-- BEGIN MELD 7T managed LazyVim extras\n.*?^-- END MELD 7T managed LazyVim extras\n?',
            '',
            text,
        )

        block = '''    -- BEGIN MELD 7T managed LazyVim extras
            { import = "lazyvim.plugins.extras.lang.python" },
            { import = "lazyvim.plugins.extras.lang.json" },
            { import = "lazyvim.plugins.extras.lang.yaml" },
            { import = "lazyvim.plugins.extras.lang.toml" },
            { import = "lazyvim.plugins.extras.lang.docker" },
            { import = "lazyvim.plugins.extras.util.project" },
            { import = "lazyvim.plugins.extras.editor.mini-files" },
            -- END MELD 7T managed LazyVim extras

        '''

        pattern = r'(?m)^(\s*\{ import = "plugins" \},)'
        if not re.search(pattern, text):
            raise SystemExit('Could not find `{ import = "plugins" },` in lazy.lua')

        text = re.sub(pattern, block + r'\1', text, count=1)
        path.write_text(text)
        PY
      args:
        executable: /bin/bash
      when: lazyvim_lazy_lua_stat.stat.exists
      tags: [editor]

    - name: Print LazyVim first-launch note
      ansible.builtin.debug:
        msg: >-
          LazyVim config installed. Run
          'distrobox enter {{ dev_box }} -- nvim'
          once to finish plugin, Tree-sitter, and Mason setup interactively.
      tags: [editor]

    # -------------------------------------------------------------------------
    # Optional AI coding CLIs
    # -------------------------------------------------------------------------

    - name: Detect Claude Code
      ansible.builtin.shell: command -v claude
      args:
        executable: /bin/bash
      environment:
        PATH: "{{ user_path }}"
      register: has_claude
      changed_when: false
      failed_when: false
      when: install_ai_cli | bool
      tags: [ai-cli]

    - name: Download Claude Code installer
      ansible.builtin.get_url:
        url: https://claude.ai/install.sh
        dest: /tmp/claude-install.sh
        mode: "0700"
      when:
        - install_ai_cli | bool
        - has_claude.rc != 0
      tags: [ai-cli]

    - name: Install Claude Code
      ansible.builtin.command: /tmp/claude-install.sh
      environment:
        PATH: "{{ user_path }}"
      when:
        - install_ai_cli | bool
        - has_claude.rc != 0
      tags: [ai-cli]

    - name: Detect Codex CLI
      ansible.builtin.shell: command -v codex
      args:
        executable: /bin/bash
      environment:
        PATH: "{{ user_path }}"
      register: has_codex
      changed_when: false
      failed_when: false
      when: install_ai_cli | bool
      tags: [ai-cli]

    - name: Download Codex CLI installer
      ansible.builtin.get_url:
        url: https://chatgpt.com/codex/install.sh
        dest: /tmp/codex-install.sh
        mode: "0700"
      when:
        - install_ai_cli | bool
        - has_codex.rc != 0
      tags: [ai-cli]

    - name: Install Codex CLI
      ansible.builtin.command: /tmp/codex-install.sh
      environment:
        PATH: "{{ user_path }}"
        CODEX_NON_INTERACTIVE: "1"
      when:
        - install_ai_cli | bool
        - has_codex.rc != 0
      tags: [ai-cli]
